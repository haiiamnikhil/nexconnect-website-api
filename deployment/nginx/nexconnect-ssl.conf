# HTTPS Nginx configuration for NexConnect (nex-connect.in)
# ============================================================
# Prerequisites:
#   1. DNS A record: nex-connect.in → EC2 public IP
#   2. Run: sudo certbot --nginx -d nex-connect.in -d www.nex-connect.in
#
# To activate manually:
#   sudo cp deployment/nginx/nexconnect-ssl.conf /etc/nginx/sites-available/nexconnect.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name nex-connect.in www.nex-connect.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nex-connect.in www.nex-connect.in;

    ssl_certificate     /etc/letsencrypt/live/nex-connect.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nex-connect.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/nexconnect/dist/frontend/browser;
    index index.html;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Angular SPA Routing ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static Asset Caching ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Proxy API to FastAPI / Gunicorn ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
